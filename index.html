<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SmartGIS</title>
  <style>
    html,body{height:100%;margin:0}
    body{background:#0b1020;overflow:hidden;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    #wrap{position:fixed;inset:0}
    #frame{position:absolute;inset:0;width:100%;height:100%;border:0}
    #loading{
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;
      color:#fff;background:rgba(0,0,0,.35);backdrop-filter:blur(10px)
    }
    .spinner{width:44px;height:44px;border-radius:999px;border:4px solid rgba(255,255,255,.22);border-top-color:rgba(104,181,255,.85);animation:spin .85s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .hint{opacity:.8;font-size:13px}
  </style>
</head>
<body>
  <div id="wrap">
    <iframe id="frame" allow="geolocation; clipboard-read; clipboard-write" referrerpolicy="no-referrer"></iframe>
    <div id="loading">
      <div class="spinner"></div>
      <div class="hint">Memuat SmartGIS…</div>
    </div>
  </div>

  <script>
    // SmartGIS Apps Script Web App URL (exec)
    const APP_URL = "https://script.google.com/macros/s/AKfycbzPip_ajzhnrPi0GNgghtJXvpgKZX1jDzheR5QcQndH07tT9eSG9887XIJPHox_3-CaFg/exec";

    // Forward querystring & hash (kalau suatu saat Anda pakai parameter)
    const qs = window.location.search || "";
    const hs = window.location.hash || "";
    const src = APP_URL + qs + hs;

    const frame = document.getElementById("frame");
    frame.src = src;

    frame.addEventListener("load", () => {
      document.getElementById("loading").style.display = "none";
    });
  </script>
</body>
</html>
